<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Finanza Banco | Simulador de Crédito</title>

    <link rel="stylesheet" href="simulador.css">

    <script src="simulador.js"></script>
    <script src="funciones.js"></script>
</head>

<body>

    <!-- Fondo decorativo -->
    <div class="background"></div>

    <main class="container">

        <!-- ===================== -->
        <!-- ENCABEZADO -->
        <!-- ===================== -->

        <header class="header">

            <img src="logo.png" alt="Finanza Banco" class="logo">

            <div class="titulo">

                <h1>BANCO FINANZA </h1>

                <p>Tu futuro financiero comienza aquí</p>

            </div>

        </header>


        <!-- ===================== -->
        <!-- DATOS FINANCIEROS -->
        <!-- ===================== -->

        <section class="card">

            <h2>💰 Datos Financieros</h2>

            <div class="campo">

                <label for="txtIngresos">
                    Ingresos Mensuales
                </label>

                <input
                    type="text"
                    id="txtIngresos"
                    placeholder="$ 0.00">

            </div>

            <div class="campo">

                <label for="txtEgresos">
                    Gastos Mensuales
                </label>

                <input
                    type="text"
                    id="txtEgresos"
                    placeholder="$ 0.00">

            </div>

        </section>


        <!-- ===================== -->
        <!-- CRÉDITO -->
        <!-- ===================== -->

        <section class="card">

            <h2>🏦 Solicitud de Crédito</h2>

            <div class="campo">

                <label for="txtMonto">

                    Monto Solicitado

                </label>

                <input
                    type="text"
                    id="txtMonto"
                    placeholder="$ 0.00">

            </div>

            <div class="dos-columnas">

                <div class="campo">

                    <label for="txtPlazo">

                        Plazo (Años)

                    </label>

                    <input
                        type="text"
                        id="txtPlazo">

                </div>

                <div class="campo">

                    <label for="txtTasaInteres">

                        Interés %

                    </label>

                    <input
                        type="text"
                        id="txtTasaInteres">

                </div>

            </div>

        </section>


        <!-- ===================== -->
        <!-- BOTONES -->
        <!-- ===================== -->

        <section class="botones">

            <button
                id="btnCalcularCredito"
                onclick="calcular()">

                Calcular Crédito

            </button>

            <button id="btnReiniciar">

                Reiniciar

            </button>

        </section>


        <!-- ===================== -->
        <!-- RESULTADOS -->
        <!-- ===================== -->

        <section class="card resultados">

            <h2>📊 Resultado del Análisis</h2>

            <div class="resultado">

                <span>Disponible</span>

                <span id="spnDisponible">$0.00</span>

            </div>

            <div class="resultado">

                <span>Capacidad de Pago</span>

                <span id="spnCapacidadPago">$0.00</span>

            </div>

            <div class="resultado">

                <span>Interés</span>

                <span id="spnInteresPagar">$0.00</span>

            </div>

            <div class="resultado">

                <span>Total del Préstamo</span>

                <span id="spnTotalPrestamo">$0.00</span>

            </div>

            <div class="resultado">

                <span>Cuota Mensual</span>

                <span id="spnCuotaMensual">$0.00</span>

            </div>

            <div class="estado">

                <span>Estado del Crédito</span>

                <strong id="spnEstadoCredito">

                    ANALIZANDO...

                </strong>

            </div>

        </section>

    </main>

</body>

</html>
